<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard - Soft School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-info">
        <div class="container">
            <a class="navbar-brand" href="/">Soft School - Student</a>
            <div class="navbar-nav ms-auto">
                <!-- Read from session instead of Spring Security -->
                <span class="navbar-text">Welcome, 
                    <span th:text="${session.username ?: 'Anonymous User'}"></span>
                </span>
                <a class="nav-link" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2>Student Dashboard</h2>
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">My Courses</h5>
                        <p class="card-text">View your enrolled courses.</p>
                        <a href="#" class="btn btn-info">Go</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Assignments</h5>
                        <p class="card-text">View and submit assignments.</p>
                        <a href="#" class="btn btn-info">Go</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Grades</h5>
                        <p class="card-text">Check your grades.</p>
                        <a href="#" class="btn btn-info">Go</a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Debug info (remove in production) -->
        <div class="mt-5">
            <h5>Session Information:</h5>
            <p>Username: <span th:text="${session.username}"></span></p>
            <p>Role: <span th:text="${session.role}"></span></p>
            <p>User ID: <span th:text="${session.userId}"></span></p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
