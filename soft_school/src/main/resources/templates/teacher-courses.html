<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>My Courses - Soft School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/teacher/dashboard">Soft School - Teacher</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">Welcome, <span sec:authentication="name">Teacher</span></span>
                <a class="nav-link" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col-md-8">
                <h2>My Courses</h2>
            </div>
            <div class="col-md-4 text-end">
                <a href="/teacher/courses/create" class="btn btn-success">+ Create New Course</a>
                <a href="/teacher/dashboard" class="btn btn-secondary">Back to Dashboard</a>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Introduction to Java</h5>
                        <p class="card-text">Spring 2026 | 3 Credits</p>
                        <p class="card-text"><small class="text-muted">Enrolled Students: 25</small></p>
                        <div class="btn-group w-100" role="group">
                            <a href="/teacher/courses/details?courseId=1" class="btn btn-outline-success btn-sm">Details</a>
                            <a href="/teacher/courses/edit?courseId=1" class="btn btn-outline-warning btn-sm">Edit</a>
                            <a href="/teacher/students/course?courseId=1" class="btn btn-outline-info btn-sm">View Students</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Web Development</h5>
                        <p class="card-text">Spring 2026 | 3 Credits</p>
                        <p class="card-text"><small class="text-muted">Enrolled Students: 18</small></p>
                        <div class="btn-group w-100" role="group">
                            <a href="/teacher/courses/details?courseId=2" class="btn btn-outline-success btn-sm">Details</a>
                            <a href="/teacher/courses/edit?courseId=2" class="btn btn-outline-warning btn-sm">Edit</a>
                            <a href="/teacher/students/course?courseId=2" class="btn btn-outline-info btn-sm">View Students</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
