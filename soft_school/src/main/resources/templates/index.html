<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Soft School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Soft School</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12 text-center">
                <h1>Welcome to Soft School Management System</h1>
                <p>Your role-based dashboard is ready.</p>
                <div sec:authorize="hasRole('ADMIN')">
                    <a href="/admin/dashboard" class="btn btn-primary">Go to Admin Dashboard</a>
                </div>
                <div sec:authorize="hasRole('TEACHER')">
                    <a href="/teacher/dashboard" class="btn btn-success">Go to Teacher Dashboard</a>
                </div>
                <div sec:authorize="hasRole('ROLE_STUDENT')">
                    <a href="/student/dashboard" class="btn btn-info">Go to Student Dashboard</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
