<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Edit Course - Soft School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/teacher/dashboard">Soft School - Teacher</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">Welcome, <span sec:authentication="name">Teacher</span></span>
                <a class="nav-link" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col-md-8">
                <h2>Edit Course</h2>
            </div>
            <div class="col-md-4 text-end">
                <a href="/teacher/courses" class="btn btn-secondary">Back to Courses</a>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8 offset-md-2">
                <form method="post" action="/teacher/courses/edit" class="needs-validation">
                    <input type="hidden" name="courseId" th:value="${courseId}">

                    <div class="mb-3">
                        <label for="title" class="form-label">Course Title</label>
                        <input type="text" class="form-control" id="title" name="title" value="Introduction to Java" required>
                    </div>

                    <div class="mb-3">
                        <label for="courseCode" class="form-label">Course Code</label>
                        <input type="text" class="form-control" id="courseCode" name="courseCode" value="CS101" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4" required>Learn the basics of Java programming, including OOP concepts, data structures, and algorithms.</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="credits" class="form-label">Credits</label>
                        <input type="number" class="form-control" id="credits" name="credits" value="3" min="1" max="4" required>
                    </div>

                    <div class="mb-3">
                        <label for="semester" class="form-label">Semester</label>
                        <select class="form-select" id="semester" name="semester" required>
                            <option value="Spring 2026" selected>Spring 2026</option>
                            <option value="Summer 2026">Summer 2026</option>
                            <option value="Fall 2026">Fall 2026</option>
                            <option value="Winter 2026">Winter 2026</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="schedule" class="form-label">Class Schedule</label>
                        <input type="text" class="form-control" id="schedule" name="schedule" value="MWF 10:00-11:00" required>
                    </div>

                    <div class="mb-3">
                        <label for="capacity" class="form-label">Student Capacity</label>
                        <input type="number" class="form-control" id="capacity" name="capacity" value="30" min="1" required>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-between">
                        <button type="submit" class="btn btn-success">Update Course</button>
                        <a href="/teacher/courses" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
