name: CI Pipeline

# Trigger workflow on push or pull request to main/develop
on:
  push:
    branches: 
      - main
      - develop
  pull_request:
    branches: 
      - main

# Permissions needed for check runs
permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Build, Test & Dockerize
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: soft_school
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Build and test Maven project
      - name: Build and test with Maven
        run: ./soft_school/mvnw clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/soft_school
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      # Generate Jacoco code coverage
      - name: Generate Code Coverage Report
        run: ./soft_school/mvnw jacoco:report
        continue-on-error: true

      # Upload coverage to Codecov
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./soft_school/target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      # Archive test results
      - name: Archive Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./soft_school/target/surefire-reports/
          retention-days: 90

      # Archive code coverage report
      - name: Archive Code Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: ./soft_school/target/site/jacoco/
          retention-days: 90

      # Publish test results as a check run
      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ./soft_school/target/surefire-reports/*.xml
          check_name: Unit Test Results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build Docker image
      - name: Build Docker Image
        if: success()
        run: |
          docker build -t softschool:${{ github.sha }} -t softschool:latest ./soft_school
          echo "Docker image built successfully"