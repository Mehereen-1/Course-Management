name: Release and Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build Release Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Extract version
        id: extract_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.extract_version.outputs.version }}
          body: |
            Release ${{ steps.extract_version.outputs.version }}
            
            Changes in this Release:
            - Build automated
            - All tests passed
            - Ready for deployment
          draft: false
          prerelease: false

      - name: Upload JAR to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./target/soft_school-*.jar
          asset_name: soft-school-${{ steps.extract_version.outputs.version }}.jar
          asset_content_type: application/java-archive

      - name: Build and Push Docker Image
        if: success()
        run: |
          docker build -t softschool:${{ steps.extract_version.outputs.version }} .
          docker tag softschool:${{ steps.extract_version.outputs.version }} softschool:latest
          echo "Docker images built and tagged"
          echo "Next: Push to Docker Hub with: docker push softschool:${{ steps.extract_version.outputs.version }}"
